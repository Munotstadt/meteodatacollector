name: Collect MeteoSwiss data (KLO)

on:
  schedule:
    # Target: 05:30 / 07:30 / 09:30 / 11:30 Swiss LOCAL time, four times a day.
    # GitHub Actions cron only runs in UTC and has no DST awareness, so we
    # define two schedules and switch between them by month:
    #   - CEST (UTC+2, roughly late Mar-late Oct) -> 03:30/05:30/07:30/09:30 UTC
    #   - CET  (UTC+1, roughly late Oct-late Mar)  -> 04:30/06:30/08:30/10:30 UTC
    # The month-based cutover (Apr-Sep vs Oct-Mar) is a ~1-week approximation
    # around the actual EU DST changeover dates; close enough for this purpose.
    - cron: "30 3,5,7,9 * 4-9 *"      # summer (CEST)
    - cron: "30 4,6,8,10 * 10-12,1-3 *"  # winter (CET)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        run: python collector/collect.py

      - name: Commit and push if changed
        run: |
          git config user.name "meteodatacollector-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/klo_daily.csv data/klo_daily.json
          if git diff --cached --quiet; then
            echo "Keine Aenderungen."
          else
            git commit -m "Update KLO Daten $(date -u +%Y-%m-%d)"
            git push
          fi
